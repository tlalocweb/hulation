# Hula E2E test stack.
#
# All services are named so lookups via docker DNS work:
#   hula, hula-clickhouse
#
# hulactl-runner and test-runner are launched via `docker compose run --rm`
# so they are short-lived ephemerals for each test command.
#
# Note: `${HULA_E2E_ROOT}` is set by setup.sh (points at test/e2e/).

services:
  hula-clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: on-failure:3
    environment:
      - CLICKHOUSE_DB=hula
      - CLICKHOUSE_USER=hula
      - CLICKHOUSE_PASSWORD=hula
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=hula --password=hula -q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  hula:
    image: hula:local
    restart: on-failure:3
    ports:
      - "${HULA_HOST_PORT:-4443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HULA_E2E_ROOT}/workdir/hula-config.yaml:/etc/hula/config.yaml:ro
      - ${HULA_E2E_ROOT}/workdir/certs:/var/hula/certs:ro
      - hula-sitedeploy:/var/hula/sitedeploy
      - hula-staging-data:/var/hula/staging
      # Bind-mount the local test site repo (read-only) so hula can clone via file://
      - ${TEST_SITE_SRC}:/var/hula/testsite-repo:ro
    environment:
      - GITHUB_AUTH_TOKEN=${GITHUB_AUTH_TOKEN}
      # Phase-4b chat suites (32-34) need /chat/start to issue
      # tokens without a real Turnstile call; the bypass mode
      # accepts any non-empty token. Production hula must NOT
      # set this — it logs a WARN at boot when active.
      - HULA_CHAT_CAPTCHA_TEST_BYPASS=1
    # Trust the bind-mounted test site repo (ownership UID mismatch between
    # host and container would otherwise trigger a "dubious ownership" error).
    # We do it via git config --global here rather than the GIT_CONFIG_* env
    # vars because git's .git directory ownership check happens before env
    # vars are parsed.
    entrypoint:
      - /bin/sh
      - -c
      - |
        git config --global safe.directory '*'
        exec /hula/hula -config /etc/hula/config.yaml
    depends_on:
      hula-clickhouse:
        condition: service_healthy

  # Run hulactl inside a short-lived container.
  # Entrypoint sets up CA trust and /etc/hosts aliases pointing to the hula
  # service, then execs hulactl with the provided arguments.
  hulactl-runner:
    image: alpine:3.19
    profiles: ["cli"]
    volumes:
      - ${HULA_E2E_ROOT}/workdir/hulactl:/usr/local/bin/hulactl:ro
      - ${HULA_E2E_ROOT}/workdir/certs/rootCA.pem:/usr/local/share/ca-certificates/hula-test-root.crt:ro
      - hulactl-config:/root/.hula
      - ${HULA_E2E_ROOT}/workdir/hulactl-mount:/mnt/hulactl-mount
    environment:
      - HULACTL_HOST=hula.test.local
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        # Install CA trust + curl + jq + grpcurl-ready toolchain. Suites 19
        # (http/2 probe) and 13 (grpc smoke) reuse this runner for curl and
        # network tooling, so keep the deps co-located with hulactl.
        if ! command -v curl >/dev/null 2>&1; then
          apk add --no-cache ca-certificates curl jq >/dev/null 2>&1
        fi
        update-ca-certificates >/dev/null 2>&1
        # Map test hostnames to the hula service IP.
        HULA_IP=$$(getent hosts hula | awk '{print $$1}')
        echo "$$HULA_IP hula.test.local site.test.local staging.test.local seed.test.local seed-cookieless.test.local" >> /etc/hosts
        exec hulactl "$$@"
      - "--"
    depends_on:
      - hula

  # Phase 4c.2 — http-recorder sidecar. A tiny long-lived service that
  # captures POSTs from the forwarder package's GA4 adapter so suite
  # 36 can assert the dispatch shape without leaking real GA4
  # credentials into CI. Receives requests at /collect on port 9080.
  forwarder-recorder:
    image: python:3.12-alpine
    restart: on-failure:3
    ports:
      - "9080"
    volumes:
      - forwarder-recorder-log:/var/log/recorder
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        cat > /tmp/recorder.py <<'PYEOF'
        import http.server, json, os, time
        LOG = "/var/log/recorder/requests.jsonl"
        class H(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                body = self.rfile.read(length).decode("utf-8", "replace")
                rec = {
                    "ts": time.time(),
                    "path": self.path,
                    "method": "POST",
                    "ct": self.headers.get("Content-Type", ""),
                    "body": body,
                }
                with open(LOG, "a") as f:
                    f.write(json.dumps(rec) + "\n")
                self.send_response(204)
                self.end_headers()
            def do_GET(self):
                # Health probe.
                self.send_response(200)
                self.send_header("Content-Type","text/plain")
                self.end_headers()
                self.wfile.write(b"ok")
            def log_message(self, *args, **kw): pass
        os.makedirs(os.path.dirname(LOG), exist_ok=True)
        http.server.HTTPServer(("0.0.0.0", 9080), H).serve_forever()
        PYEOF
        exec python3 /tmp/recorder.py

  # Same idea for curl-based tests (direct WebDAV, Hugo output verification).
  test-runner:
    image: alpine:3.19
    profiles: ["cli"]
    volumes:
      - ${HULA_E2E_ROOT}/workdir/certs/rootCA.pem:/usr/local/share/ca-certificates/hula-test-root.crt:ro
      - ${HULA_E2E_ROOT}/workdir:/workdir
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if ! command -v curl >/dev/null 2>&1; then
          apk add --no-cache curl ca-certificates jq >/dev/null 2>&1
        fi
        update-ca-certificates >/dev/null 2>&1
        HULA_IP=$$(getent hosts hula | awk '{print $$1}')
        echo "$$HULA_IP hula.test.local site.test.local staging.test.local seed.test.local seed-cookieless.test.local" >> /etc/hosts
        exec "$$@"
      - "--"
    depends_on:
      - hula

volumes:
  ch_data:
  ch_logs:
  hula-sitedeploy:
  hula-staging-data:
  hulactl-config:
  forwarder-recorder-log:
