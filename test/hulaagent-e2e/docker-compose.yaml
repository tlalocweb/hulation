# Self-contained hulaagent e2e stack — hula + clickhouse + a thin
# hulactl-runner. Stripped from the main test/e2e fixture; no test-
# site mounts, no min-site fixtures, no forwarder-recorder.
#
# Run via test/hulaagent-e2e/run.sh, NOT directly. The script
# generates certs and renders the config into ${WORKDIR} before
# bringing this up.

services:
  hula-clickhouse:
    image: clickhouse/clickhouse-server:26.4
    restart: on-failure:3
    environment:
      - CLICKHOUSE_DB=hula
      - CLICKHOUSE_USER=hula
      - CLICKHOUSE_PASSWORD=hula
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - ch-data:/var/lib/clickhouse

  hula:
    image: hula:local
    restart: on-failure:3
    depends_on:
      - hula-clickhouse
    ports:
      - "${HULA_PORT:-14443}:443"
    volumes:
      # Docker-in-docker for the build manager to be able to ping
      # docker at startup (NewBuildManager calls cli.Ping). The
      # BUILD verb's bogus-repo test path fails at git clone before
      # ever touching docker, but hula won't start without this.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKDIR}/hula-config.yaml:/etc/hula/config.yaml:ro
      - ${WORKDIR}/certs:/var/hula/certs:ro
    networks:
      default:
        aliases:
          - hula.test.local

  hulactl-runner:
    image: alpine:3.19
    profiles: ["cli"]
    volumes:
      - ${WORKDIR}/hulactl:/usr/local/bin/hulactl:ro
      - ${WORKDIR}/certs/rootCA.pem:/usr/local/share/ca-certificates/hula-test-root.crt:ro
      - hulactl-config:/root/.hula
    environment:
      - HULACTL_HOST=hula.test.local
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if ! command -v curl >/dev/null 2>&1; then
          apk add --no-cache ca-certificates curl jq >/dev/null 2>&1
        fi
        update-ca-certificates >/dev/null 2>&1
        HULA_IP=$$(getent hosts hula | awk '{print $$1}')
        echo "$$HULA_IP hula.test.local" >> /etc/hosts
        exec hulactl "$$@"
      # The "--" becomes $0 for the sh -c script; the user's args
      # from `dc run <svc> <args>` then land as $1+ so the script's
      # `"$@"` captures the full verb + flags. Without this, $0
      # would swallow the verb and `exec hulactl "$@"` would call
      # hulactl with only the flags. Same trick the main e2e
      # fixture uses.
      - "--"

volumes:
  ch-data:
  hulactl-config:
