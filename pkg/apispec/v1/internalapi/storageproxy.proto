syntax = "proto3";

// StorageProxyService — followers forward Raft writes to the leader
// over this RPC (HA_PLAN3 §9). Stage 3.5 fills in the apply path;
// Stage 3.2 just lands the proto + a stub.

package hulation.v1.internalapi;

option go_package = "github.com/tlalocweb/hulation/pkg/apispec/v1/internalapi;internalapispec";

service StorageProxyService {
  rpc Apply(ApplyRequest) returns (ApplyResponse);
}

message ApplyRequest {
  // command is the proto-encoded RaftCommand from
  // pkg/store/storage/raft/cmd.proto. Followers serialise once and
  // hand it through to the leader's r.Apply().
  bytes command = 1;
}

message ApplyResponse {
  // applied_index is the Raft index assigned to this command after
  // the leader committed it; used by the caller as a synchronization
  // hint (read-after-write).
  uint64 applied_index = 1;
}
