syntax = "proto3";

// MobileService — the compact, phone-sized projection of the
// analytics surface. Endpoints deliberately return smaller payloads
// than the web /summary + /timeseries endpoints: fewer fields,
// bucketised to screen-sized timeseries (12 or 24 points), and with
// device-registration helpers so the mobile app can opt into push
// notifications.
//
// Versioned at `/api/mobile/v1/*` so future breaking changes can
// ship as `v2` without disturbing installed apps.

package hulation.v1.mobile;

option go_package = "github.com/tlalocweb/hulation/pkg/apispec/v1/mobile;mobilespec";

import "google/api/annotations.proto";
import "hula/auth/permission.proto";
import "google/protobuf/timestamp.proto";

service MobileService {
  // RegisterDevice records an APNs / FCM token for the caller. The
  // plaintext token is sealed in AES-GCM before persisting (see
  // pkg/mobile/tokenbox). Idempotent: re-registering the same
  // (platform, device_fingerprint) replaces the token.
  rpc RegisterDevice(RegisterDeviceRequest) returns (Device) {
    option (google.api.http) = {
      post: "/api/mobile/v1/devices"
      body: "*"
    };
    // Any authenticated user can register their own device.
  }

  rpc UnregisterDevice(UnregisterDeviceRequest) returns (UnregisterDeviceResponse) {
    option (google.api.http) = {
      delete: "/api/mobile/v1/devices/{device_id}"
    };
  }

  // ListMyDevices — caller sees their own devices (no admin flag).
  rpc ListMyDevices(ListMyDevicesRequest) returns (ListMyDevicesResponse) {
    option (google.api.http) = {
      get: "/api/mobile/v1/devices"
    };
  }

  // MobileSummary — compact KPI payload. Includes a 12-point
  // sparkline so the app doesn't need a second round-trip for the
  // dashboard card.
  rpc MobileSummary(MobileSummaryRequest) returns (MobileSummaryResponse) {
    option (google.api.http) = {
      get: "/api/mobile/v1/summary"
    };
    option (hula.auth.permission) = { needs: ["server.{server_id}.analytics.read"] };
  }

  // MobileTimeseries — bucketised to 12 (hourly) or 24 (daily) points
  // by default. Larger buckets → smaller payload; matches the
  // phone's usable horizontal resolution.
  rpc MobileTimeseries(MobileTimeseriesRequest) returns (MobileTimeseriesResponse) {
    option (google.api.http) = {
      get: "/api/mobile/v1/timeseries"
    };
    option (hula.auth.permission) = { needs: ["server.{server_id}.analytics.read"] };
  }

  // MobileTopPages — top URL paths by pageviews for the preset window.
  // Delegates to the analytics Pages query builder; trimmed to a
  // phone-card-sized row count (default 5).
  rpc MobileTopPages(MobileTopPagesRequest) returns (MobileTopPagesResponse) {
    option (google.api.http) = {
      get: "/api/mobile/v1/top-pages"
    };
    option (hula.auth.permission) = { needs: ["server.{server_id}.analytics.read"] };
  }

  // MobileLiveChats — counts of in-flight chat sessions on this
  // server. Drives the "N chat needs you right now" banner on the
  // Overview tab. queued = no agent; assigned = picked up but no
  // visitor message yet; open = active conversation.
  rpc MobileLiveChats(MobileLiveChatsRequest) returns (MobileLiveChatsResponse) {
    option (google.api.http) = {
      get: "/api/mobile/v1/live-chats"
    };
    // chat.read is enough — the response is aggregate counts, never
    // visitor PII or message bodies.
    option (hula.auth.permission) = { needs: ["server.{server_id}.chat.read"] };
  }
}

enum Platform {
  PLATFORM_UNSPECIFIED = 0;
  PLATFORM_APNS        = 1;  // Apple Push Notification service (iOS)
  PLATFORM_FCM         = 2;  // Firebase Cloud Messaging (Android)
}

message Device {
  string id = 1;
  string user_id = 2;
  Platform platform = 3;
  // Opaque client-generated string that uniquely identifies a
  // physical device for re-registration idempotency.
  string device_fingerprint = 4;
  // Friendly label shown in the admin UI ("iPhone 14 Pro",
  // "Pixel 7 work"). Optional.
  string label = 5;
  google.protobuf.Timestamp registered_at = 6;
  google.protobuf.Timestamp last_seen_at = 7;
  bool active = 8;  // false after dead-token unregister
}

message RegisterDeviceRequest {
  Platform platform = 1;
  // Raw push token — APNs device token (hex) or FCM registration
  // token. The server encrypts before persisting. Used by the
  // legacy direct-APNs/FCM fan-out path; new devices that pair via
  // the relay typically leave this empty and fill the relay_*
  // fields below instead.
  string token = 2;
  string device_fingerprint = 3;
  string label = 4;
  // hula-push-relay channel id (`pch_...`), returned by the relay
  // when the device called POST /v1/channels/register. Stored as
  // plaintext (non-secret).
  string relay_channel_id = 5;
  // hula-push-relay channel auth — per-channel shared secret the
  // relay validates on every push. Sealed alongside `token` and
  // never logged in plaintext.
  string relay_channel_auth = 6;
  // Device's per-server X25519 public key (32 raw bytes,
  // base64-encoded). hulation seals the visible push preview to
  // this key; the device unseals on-receipt inside the iOS NSE or
  // Android FirebaseMessagingService. See
  // hula-mobile/common/src/keys.rs::ensure_device_keypair for the
  // device-side keypair generation.
  string noise_encryption_pub_b64 = 7;
}

message UnregisterDeviceRequest {
  string device_id = 1;
}

message UnregisterDeviceResponse {
  bool ok = 1;
}

message ListMyDevicesRequest {}

message ListMyDevicesResponse {
  repeated Device devices = 1;
}

message MobileSummaryRequest {
  string server_id = 1;
  // Window — accepts "24h" / "7d" / "30d". Defaults to "7d" when
  // empty. Deliberately a preset rather than a from/to pair; the
  // phone UI only exposes presets.
  string preset = 2;
}

message MobileSummaryResponse {
  int64 visitors = 1;
  int64 pageviews = 2;
  double bounce_rate = 3;
  double avg_session_duration_seconds = 4;
  // 12-point bucketised visitor sparkline — sized for a phone card.
  repeated int64 sparkline_visitors = 5;
}

message MobileTimeseriesRequest {
  string server_id = 1;
  string preset = 2;
  // Granularity: "hour" (→ 12 points) or "day" (→ 24 points).
  // Defaults to the preset's natural grain.
  string granularity = 3;
}

message MobileTimeseriesResponse {
  // ts strings are RFC 3339 — keeps payload tiny compared to a
  // nested Timestamp message.
  repeated string ts = 1;
  repeated int64 visitors = 2;
  repeated int64 pageviews = 3;
}

message MobileTopPagesRequest {
  string server_id = 1;
  string preset = 2;
  // Row cap. 0 → defaults to 5 (the phone Overview card fits ~5
  // rows above the fold). Server caps at 25 regardless.
  int32 limit = 3;
}

message MobileTopPage {
  string path = 1;
  int64 visitors = 2;
  int64 pageviews = 3;
}

message MobileTopPagesResponse {
  repeated MobileTopPage pages = 1;
}

message MobileLiveChatsRequest {
  string server_id = 1;
}

message MobileLiveChatsResponse {
  // Sessions with no agent assigned yet — the "drop everything" set
  // that drives the red Overview banner.
  int32 awaiting_reply = 1;
  // Sessions picked up by an agent but with no visitor message since
  // the assignment.
  int32 assigned = 2;
  // Active in-flight conversations.
  int32 open = 3;
}
