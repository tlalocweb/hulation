syntax = "proto3";

// StatusService — liveness/auth-status probes for the hula admin API.

package hulation.v1.status;

option go_package = "github.com/tlalocweb/hulation/pkg/apispec/v1/status;statusspec";

import "google/api/annotations.proto";
import "pkg/server/authware/proto/annotations.proto";

service StatusService {
  // Status reports basic liveness information. Authenticated; no specific
  // permission required (any valid token suffices).
  rpc Status(StatusRequest) returns (StatusResponse) {
    option (google.api.http) = { get: "/api/v1/status" };
  }

  // AuthOk verifies the caller's token is valid. Returns 200 when so.
  rpc AuthOk(AuthOkRequest) returns (AuthOkResponse) {
    option (google.api.http) = { get: "/api/v1/auth/ok" };
  }
}

message StatusRequest {}

message StatusResponse {
  // ok is true when the server is healthy.
  bool ok = 1;
  // version is the build version of the running hula binary.
  string version = 2;
  // uptime_seconds since process start.
  int64 uptime_seconds = 3;
}

message AuthOkRequest {}

message AuthOkResponse {
  // ok is true when the caller's token is valid and not expired.
  bool ok = 1;
  // user_id from the JWT claim (empty if unauthenticated, but the
  // endpoint will 401 before returning in that case).
  string user_id = 2;
  // username (display name) associated with the token.
  string username = 3;
}
