name: Release CLI Tools

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0). Defaults to dev if empty.'
        required: false
        default: 'dev'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-13
            goos: darwin
            goarch: amd64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout hulation
        uses: actions/checkout@v4
        with:
          path: hulation

      - name: Checkout clickhouse driver
        uses: actions/checkout@v4
        with:
          repository: tlalocweb/clickhouse
          path: clickhouse

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: hulation/go.sum

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build hulactl
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd hulation
          go build \
            -ldflags "-X github.com/tlalocweb/hulation/config.Version=${{ steps.version.outputs.tag }} -X github.com/tlalocweb/hulation/config.BuildDate=${{ steps.version.outputs.date }}" \
            -o hulactl \
            ./model/tools/hulactl

      - name: Package binary
        run: |
          cd hulation
          tar czf hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz hulactl
          sha256sum hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz > hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256 || shasum -a 256 hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz > hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hulactl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            hulation/hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            hulation/hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
