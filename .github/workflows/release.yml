name: Release CLI Tools

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0). Defaults to dev if empty.'
        required: false
        default: 'dev'

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            goos: linux
            goarch: amd64
          - runner: [self-hosted, Linux, ARM64]
            goos: linux
            goarch: arm64
          - runner: [self-hosted, macOS, ARM64]
            goos: darwin
            goarch: arm64
          - runner: [self-hosted, macOS, X64]
            goos: darwin
            goarch: amd64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout hulation
        uses: actions/checkout@v4
        with:
          path: hulation

      - name: Checkout clickhouse driver
        uses: actions/checkout@v4
        with:
          repository: tlalocweb/clickhouse
          path: clickhouse

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: hulation/go.sum

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build hulactl
        env:
          CGO_ENABLED: 1
        run: |
          cd hulation
          go build \
            -ldflags "-X github.com/tlalocweb/hulation/config.Version=${{ steps.version.outputs.tag }} -X github.com/tlalocweb/hulation/config.BuildDate=${{ steps.version.outputs.date }}" \
            -o hulactl \
            ./model/tools/hulactl

      - name: Package binary
        run: |
          cd hulation
          tar czf hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz hulactl
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz > hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          else
            shasum -a 256 hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz > hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hulactl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            hulation/hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            hulation/hulactl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256

  release:
    needs: build
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
