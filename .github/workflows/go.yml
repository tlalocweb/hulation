# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v3
      with:
        path: hulation

    - uses: actions/checkout@v3
      with:
        repository: tlalocweb/clickhouse
        path: clickhouse

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Build
      run: cd hulation && go build -v .

#    - name: Test
#      run: go test -v .
