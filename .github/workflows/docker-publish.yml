name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0). Defaults to dev if empty.'
        required: false
        default: 'dev'

jobs:
  docker:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout hulation
        uses: actions/checkout@v4
        with:
          path: hulation

      - name: Checkout clickhouse driver
        uses: actions/checkout@v4
        with:
          repository: tlalocweb/clickhouse
          path: clickhouse

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hulation/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            hulaversion=${{ steps.version.outputs.tag }}
            hulabuilddate=${{ steps.version.outputs.date }}
          tags: |
            ghcr.io/tlalocweb/hula:${{ steps.version.outputs.tag }}
            ghcr.io/tlalocweb/hula:latest
