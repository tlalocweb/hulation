admin:
  hash: "$argon2id$v=19$m=16384,t=12,p=4$wgJ+pzUyMgQTCOu6/Wi4xQ$pd7IPBD0GeKuYDs40Osni9hvCrgH8g7mkosDUxkm3EqYf/1zesUamtPRa9cNfLNW"
# use hulactl to generate a random string
jwt_key: "randomstringhere"
port: 8088
# ssl:
#   cert: cert.pem
#   key: key.pem
# or use Let's Encrypt automatic certificates:
# ssl:
#   acme:
#     email: admin@example.com
#     cache_dir: /var/hula/certs
#     http_port: 80  # change if behind a reverse proxy
proxies:
  - target: http://localhost:1314
    by_path: "/"
servers:
  - host: localhost
    aliases: 
     - "127.0.0.1"
    id: abc123
    ignore_port_in_host: true
    publish_port: true
    http_scheme: http
    path_prefix: "/hula"
    captcha_secret: "1x0000000000000000000000000000000AA"
cors:
  allow_origins: "http://localhost:1314"
  # will set the Access-Control-Allow-Origin header to the value of the originating request's host
  # this should only be set for debug / development reasons
  unsafe_any_origin: true
  allow_credentials: true
dbconfig:
  host: hula-clickhouse
  port: 9000
  user: hula
  pass: hula
  dbname: hula
# Mobile app + encrypted push (all optional — see README "Mobile app, QR pairing
# & encrypted push"). Generate the keys with `hulactl noise-static-key` and
# `hulactl visitor-chat-key`; store the private halves in a secrets manager.
# noise_static_key: "BASE64URL"   # gRPC chat-stream Noise_IK responder static key
# visitor_chat_key: "BASE64URL"   # browser widget sealed-box key
# push_relay:                     # server-blind APNs/FCM fan-out via hula-push-relay
#   base_url: "https://relay.example.com"
#   installation_id: "inst_..."   # issued by the relay at enrollment
#   signing_key_b64: "..."        # 32-byte ed25519 seed (base64 standard)
